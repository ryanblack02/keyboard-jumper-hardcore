<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keyboard Jumper Hardcore</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app">

    <!-- HEADER -->
    <header class="top-bar">
      <div class="brand">
        <h1>Keyboard Jumper</h1>
        <span class="mode">Hardcore Mode</span>
      </div>

      <div class="controls">
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
          <option value="all">All</option>
        </select>

        <button id="startBtn">Start</button>
        <button id="restartBtn">Restart</button>
      </div>
    </header>

    <!-- DASHBOARD -->
    <section class="dashboard">
      <div class="stat">
        <span class="label">WPM</span>
        <span id="wpm">0</span>
      </div>

      <div class="stat">
        <span class="label">Accuracy</span>
        <span id="accuracy">100%</span>
      </div>

      <div class="stat">
        <span class="label">Time</span>
        <span id="time">0s</span>
      </div>

      <div class="stat">
        <span class="label">Words</span>
        <span id="words">0</span>
      </div>

      <div class="stat danger">
        <span class="label">Errors</span>
        <span id="errors">0</span>
      </div>
    </section>

    <!-- GAME AREA -->
    <main class="game-container">

      <div class="word-display">
        <div id="word" class="word"></div>
      </div>

      <div class="typing-area">
        <input
          id="hiddenInput"
          type="text"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

    </main>

    <!-- SESSION REPORT (hidden by default) -->
    <section id="reportScreen" class="report hidden">

      <h2>Session Complete</h2>

      <div class="report-stats">
        <p>WPM: <span id="finalWpm"></span></p>
        <p>Accuracy: <span id="finalAccuracy"></span></p>
        <p>Time: <span id="finalTime"></span></p>
        <p>Words Completed: <span id="finalWords"></span></p>
        <p>Errors: <span id="finalErrors"></span></p>
      </div>

      <div class="weak-words">
        <h3>Weak Words</h3>
        <ul id="weakWordsList"></ul>
      </div>

      <button id="playAgainBtn">Play Again</button>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
