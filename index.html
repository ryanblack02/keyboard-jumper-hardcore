<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Typing Trainer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <!-- MAIN GAME -->
    <div id="game">

        <h1 class="title">Neon Typing Hardcore</h1>

        <p id="status">Loading...</p>

        <h2 id="word">---</h2>

        <input id="input" type="text" autocomplete="off" autofocus />

        <!-- DASHBOARD -->
        <div id="dashboard">

            <div class="panel">
                <canvas id="wpmChart"></canvas>
                <p>WPM</p>
            </div>

            <div class="panel">
                <canvas id="accChart"></canvas>
                <p>Accuracy</p>
            </div>

        </div>

        <!-- WEAK WORDS -->
        <div id="weakPanel">
            <h3>Weak Words</h3>
            <ul id="weakList"></ul>
        </div>

    </div>

</div>


<!-- SESSION REPORT OVERLAY -->
<div id="report" class="hidden">
    <div id="reportBox">

        <h2>Session Report</h2>

        <p id="reportStats"></p>

        <div id="reportWeak">
            <h3>Weak Words</h3>
            <ul id="reportWeakList"></ul>
        </div>

        <button id="restartBtn">Restart</button>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
