<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Typing Trainer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

    <h1>Neon Typing Hardcore</h1>

    <p id="status">Loading...</p>

    <h2 id="word">---</h2>

    <input id="input" type="text" autocomplete="off" autofocus />

    <!-- 📊 DASHBOARD -->
    <div id="dashboard">
        <div class="panel">
            <canvas id="wpmChart"></canvas>
            <p>WPM</p>
        </div>

        <div class="panel">
            <canvas id="accChart"></canvas>
            <p>Accuracy</p>
        </div>
    </div>

    <!-- 🧠 WEAK WORD PANEL -->
    <div id="weakPanel">
        <h3>Weak Words</h3>
        <ul id="weakList"></ul>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
